# ═══════════════════════════════════════════════════
#  FunASR All-in-One — CPU 版
#  ──────────────────────────────────────────────
#  使用: cp docker/.env.cpu .env && cp docker/docker-compose.cpu.yml docker-compose.override.yml
#        docker compose up -d
#  ═══════════════════════════════════════════════════

services:
  funasr:
    build:
      context: ..
      dockerfile: Dockerfile
    image: funasr-all-in-one:cpu
    container_name: funasr

    ports:
      - "${FUNASR_PORT:-17767}:17767"

    environment:
      - FUNASR_DEVICE=cpu
      - MODEL=${MODEL:-fun-asr-nano}
      - FUNASR_PORT=17767
      - PRELOAD_ALL=${PRELOAD_ALL:-true}
      - ENABLE_STREAMING=${ENABLE_STREAMING:-true}
      - ENABLE_MCP=${ENABLE_MCP:-true}
      - API_TOKEN=${API_TOKEN:-}
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      - FUNASR_DATA_DIR=/app/data
      # CPU 保守并发
      - FUNASR_NCPU=${FUNASR_NCPU:-4}
      - FUNASR_WORKER_THREADS=${FUNASR_WORKER_THREADS:-4}
      - FUNASR_CONCURRENT_VAD=${FUNASR_CONCURRENT_VAD:-2}
      - FUNASR_CONCURRENT_ASR_OFFLINE=${FUNASR_CONCURRENT_ASR_OFFLINE:-1}
      - FUNASR_CONCURRENT_ASR_ONLINE=${FUNASR_CONCURRENT_ASR_ONLINE:-2}
      - FUNASR_CONCURRENT_PUNC=${FUNASR_CONCURRENT_PUNC:-1}
      - FUNASR_CONCURRENT_SV=${FUNASR_CONCURRENT_SV:-1}
      - FUNASR_CONCURRENT_EMOTION=${FUNASR_CONCURRENT_EMOTION:-1}
      - FUNASR_MAX_TASKS=${FUNASR_MAX_TASKS:-100}
      - FUNASR_DATA_TTL_DAYS=${FUNASR_DATA_TTL_DAYS:-7}

    volumes:
      - ../models:/root/.cache/modelscope:z
      - ../data:/app/data:z
      - ../web:/app/web:z
      - ../hotwords.txt:/app/hotwords.txt:ro

    shm_size: "2gb"
    restart: unless-stopped
