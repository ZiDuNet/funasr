# ═══════════════════════════════════════════════════
#  FunASR All-in-One — GPU 云端镜像版
#  ──────────────────────────────────────────────
#  前提: 安装 NVIDIA Container Toolkit
#  使用: cp docker/.env.gpu .env
#        docker compose -f docker/docker-compose.gpu.pull.yml up -d
#  ═══════════════════════════════════════════════════

services:
  funasr:
    image: crpi-kdrx8sxe4fzlfrwj.cn-hangzhou.personal.cr.aliyuncs.com/wushuo98/funasr:latest
    container_name: funasr

    ports:
      - "${FUNASR_PORT:-17767}:17767"

    environment:
      - FUNASR_DEVICE=cuda
      - MODEL=${MODEL:-fun-asr-nano}
      - FUNASR_PORT=17767
      - PRELOAD_ALL=${PRELOAD_ALL:-true}
      - ENABLE_STREAMING=${ENABLE_STREAMING:-true}
      - ENABLE_MCP=${ENABLE_MCP:-true}
      - API_TOKEN=${API_TOKEN:-}
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      - FUNASR_DATA_DIR=/app/data
      - FUNASR_NCPU=${FUNASR_NCPU:-4}
      - FUNASR_WORKER_THREADS=${FUNASR_WORKER_THREADS:-8}
      - FUNASR_CONCURRENT_VAD=${FUNASR_CONCURRENT_VAD:-4}
      - FUNASR_CONCURRENT_ASR_OFFLINE=${FUNASR_CONCURRENT_ASR_OFFLINE:-2}
      - FUNASR_CONCURRENT_ASR_ONLINE=${FUNASR_CONCURRENT_ASR_ONLINE:-4}
      - FUNASR_CONCURRENT_PUNC=${FUNASR_CONCURRENT_PUNC:-2}
      - FUNASR_CONCURRENT_SV=${FUNASR_CONCURRENT_SV:-2}
      - FUNASR_CONCURRENT_EMOTION=${FUNASR_CONCURRENT_EMOTION:-2}
      - FUNASR_MAX_TASKS=${FUNASR_MAX_TASKS:-1000}
      - FUNASR_DATA_TTL_DAYS=${FUNASR_DATA_TTL_DAYS:-7}

    volumes:
      - ../models:/root/.cache/modelscope:z
      - ../data:/app/data:z
      - ../web:/app/web:z
      - ../hotwords.txt:/app/hotwords.txt:ro

    shm_size: "2gb"
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
