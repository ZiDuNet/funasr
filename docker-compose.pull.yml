# ═══════════════════════════════════════════════════
#  FunASR All-in-One — 在线镜像拉取版
#  ──────────────────────────────────────────────
#  使用预构建镜像，无需本地 build
#  ═══════════════════════════════════════════════════
#  使用:
#   1. cp .env.example .env
#   2. 修改下方 image 为实际镜像地址
#   3. docker compose -f docker-compose.pull.yml up -d
# ═══════════════════════════════════════════════════

services:
  funasr:
    # 国内用户: 替换为阿里云容器镜像服务地址
    # 1. 登录阿里云容器镜像服务: https://cr.console.aliyun.com
    # 2. 创建命名空间和仓库，推送镜像后替换下方地址
    # image: registry.cn-hangzhou.aliyuncs.com/<命名空间>/funasr-all-in-one:latest
    image: funasr-all-in-one:latest
    container_name: funasr

    ports:
      - "${FUNASR_PORT:-17767}:17767"

    environment:
      - FUNASR_DEVICE=${FUNASR_DEVICE:-cpu}
      - MODEL=${MODEL:-sensevoice}
      - FUNASR_PORT=17767
      - PRELOAD_ALL=${PRELOAD_ALL:-true}
      - ENABLE_STREAMING=${ENABLE_STREAMING:-true}
      - ENABLE_MCP=${ENABLE_MCP:-true}
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      - FUNASR_DATA_DIR=/app/data

    volumes:
      - ./models:/root/.cache/modelscope:z
      - ./data:/app/data:z
      - ./web:/app/web:z
      - ./hotwords.txt:/app/hotwords.txt:ro

    shm_size: "2gb"
    restart: unless-stopped

    # ── GPU 模式 ──────────────────────────────
